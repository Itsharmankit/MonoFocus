# CodeRabbit Configuration for MonoFocus
# Visit https://coderabbit.ai for more information

language: "en-US"

# Review settings
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "app/**/*.tsx"
      instructions: |
        Review React Native screens: check useMemo/useCallback usage, useEffect cleanup, accessibility, and navigation patterns.
    - path: "components/**/*.tsx"
      instructions: |
        Review components: validate TypeScript types, check reusability, animation performance, and theme consistency.
    - path: "utils/**/*.ts"
      instructions: |
        Review utilities: validate error handling, AsyncStorage patterns, date logic, and input validation.
    - path: "constants/**/*.ts"
      instructions: |
        Review theme: ensure proper TypeScript typing, consistent usage, and design system compliance.

# Chat settings
chat:
  auto_reply: true

# Tone of reviews
tone_instructions: "Focus on React Native/Expo best practices, TypeScript safety, performance, mobile concerns (battery, memory), AsyncStorage patterns, and proper React hooks usage."
